name: Build & Release

on:
  release:
    types: [published]

# Give the token write access to create release assets
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt;prompts"
          --add-data "assets/icon.png;assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build app
        run: >
          pyinstaller --onedir --windowed
          --name KPrompter
          --icon assets/icon.icns
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          --add-data "assets/icon.icns:assets"
          --osx-bundle-identifier "com.ktorres.kprompter"
          main.py

      - name: Inject Info.plist + icon
        run: |
          cp Info.plist dist/KPrompter.app/Contents/Info.plist
          cp assets/icon.icns dist/KPrompter.app/Contents/Resources/icon.icns

      - name: Strip quarantine from app
        run: |
          find dist/KPrompter.app -name "._*" -delete
          xattr -cr dist/KPrompter.app

      - name: Build PKG installer
        run: |
          mkdir -p pkg_root/Applications pkg_scripts
          cp -r dist/KPrompter.app pkg_root/Applications/KPrompter.app
          printf '#!/bin/bash\nxattr -dr com.apple.quarantine /Applications/KPrompter.app 2>/dev/null || true\nexit 0\n' > pkg_scripts/postinstall
          chmod +x pkg_scripts/postinstall
          pkgbuild \
            --root pkg_root \
            --scripts pkg_scripts \
            --identifier com.ktorres.kprompter \
            --version ${{ github.ref_name }} \
            --install-location / \
            dist/KPrompter-macOS.pkg

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter-macOS.pkg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xclip xdotool python3-tk

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build binary
        run: >
          pyinstaller --onefile
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter
