name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt;prompts"
          --add-data "assets/icon.png;assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build .app bundle
        run: >
          pyinstaller --onedir --windowed
          --name KPrompter
          --icon assets/icon.icns
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          --add-data "assets/icon.icns:assets"
          --osx-bundle-identifier "com.ktorres.kprompter"
          main.py

      - name: Inject Info.plist and icon
        run: |
          cp Info.plist dist/KPrompter.app/Contents/Info.plist
          cp assets/icon.icns dist/KPrompter.app/Contents/Resources/icon.icns

      - name: Clean resource forks and strip quarantine
        run: |
          find dist/KPrompter.app -name "._*" -delete
          xattr -cr dist/KPrompter.app

      - name: Zip the app
        run: zip -r dist/KPrompter-macOS.zip dist/KPrompter.app

      - name: Verify zip size (must be > 30MB)
        run: |
          SIZE=$(stat -f%z dist/KPrompter-macOS.zip)
          echo "Zip size: $SIZE bytes"
          if [ "$SIZE" -lt 31457280 ]; then
            echo "ERROR: zip is too small ($SIZE bytes) — bundle likely corrupt"
            exit 1
          fi

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xclip xdotool python3-tk

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build binary
        run: >
          pyinstaller --onefile
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter
