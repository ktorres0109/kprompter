name: Build & Release

on:
  release:
    types: [published]

# Give the token write access to create release assets
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt;prompts"
          --add-data "assets/icon.png;assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build app
        run: >
          pyinstaller --onedir --windowed
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          main.py

      - name: Zip app bundle
        run: cd dist && zip -r KPrompter-macOS.zip KPrompter.app

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xclip xdotool python3-tk

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python icon_gen.py

      - name: Build binary
        run: >
          pyinstaller --onefile
          --name KPrompter
          --icon assets/icon.png
          --add-data "prompts/default.txt:prompts"
          --add-data "assets/icon.png:assets"
          main.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KPrompter
